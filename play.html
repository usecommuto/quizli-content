<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta property="og:title" content="Quizli - Pub Round">
<meta property="og:description" content="Join a live pub quiz round! Answer London trivia questions and compete with friends.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#D67B3C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Quizli - Pub Round</title>
<style>
:root {
  /* Exact iOS Theme.swift tokens */
  --cream: #F2EADB;
  --surface: #FFFFFF;
  --surface-warm: #FBF5EA;
  --surface-warm2: #F4EBDB;
  --line: #EFE6D2;
  --ink: #2A241E;
  --ink-soft: #7A6F60;
  --ink-faint: #ABA08C;
  --accent: #D67B3C;
  --accent-deep: #B85F23;
  --accent-soft: #F7E4D2;
  --green: #5C8A52;
  --green-soft: #E2EAD9;
  --red: #C0432F;
  --gold: #E0A93E;
  --gold-soft: #FBEAD0;
  --navy: #1C3A5E;
  --radius: 18px;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Rounded', 'Segoe UI', Roboto, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
body {
  background: var(--cream);
  color: var(--ink);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  /* Respect notches / home indicators on phones. */
  padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
           max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
}
/* Short screens (landscape phones): pin to top so tall content scrolls cleanly. */
@media (max-height: 680px) { body { justify-content: flex-start; } }

/* Screens */
.screen { display: none; width: 100%; max-width: 440px; }
.screen.active { display: flex; flex-direction: column; gap: 16px; align-items: center; }

/* Join screen */
h1 { font-size: clamp(1.5rem, 6vw, 2rem); font-weight: 900; text-align: center; }
h1 span { color: var(--accent); }
.card {
  background: var(--surface);
  border-radius: 22px;
  border: 1px solid var(--line);
  padding: 28px 24px;
  width: 100%;
  max-width: 440px;
}
label { display: block; font-size: .7rem; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1.1px; color: var(--ink-soft); }
input[type=text] {
  width: 100%;
  padding: 16px;
  border: 1.5px solid var(--line);
  border-radius: 14px;
  font-size: 1.05rem;
  font-weight: 600;
  outline: none;
  transition: border-color .2s;
  background: var(--surface);
  color: var(--ink);
}
input[type=text]:focus { border-color: var(--accent); }
input.room-input { letter-spacing: 4px; text-transform: uppercase; text-align: center; font-weight: 800; font-size: 1.3rem; }
.btn-primary {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; margin-top: 16px; padding: 18px;
  background: var(--accent); color: #fff; font-size: 1.05rem; font-weight: 700;
  border: none; border-radius: var(--radius); cursor: pointer;
  transition: transform .1s;
  box-shadow: 0 10px 16px rgba(214,123,60,.4);
}
.btn-primary:active { transform: scale(.97); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }

/* Top bar */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 0 4px;
}
.room-pill {
  font-size: .7rem; font-weight: 700; color: var(--ink-soft);
  padding: 4px 10px; background: var(--surface-warm2); border-radius: 99px;
  letter-spacing: .5px;
}
.q-counter { font-size: .85rem; font-weight: 700; color: var(--ink); }
.score-badge {
  display: flex; align-items: center; gap: 4px;
  font-size: .85rem; font-weight: 700; color: var(--accent-deep);
}
.score-badge svg { width: 14px; height: 14px; fill: var(--accent); }

/* Circular timer */
.timer-ring-wrap { position: relative; width: 68px; height: 68px; }
.timer-ring-wrap svg { width: 68px; height: 68px; transform: rotate(-90deg); }
.timer-ring-bg { fill: none; stroke: var(--line); stroke-width: 6; }
.timer-ring-fg { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .1s linear, stroke .3s; }
.timer-num {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; font-weight: 900;
}
.speed-bonus { font-size: .7rem; font-weight: 600; text-align: center; opacity: .8; }

/* Category chip */
.cat-chip {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 13px; background: var(--navy); border-radius: 99px;
}
.cat-dot { width: 14px; height: 14px; border-radius: 50%; position: relative; }
.cat-dot::after { content: ''; position: absolute; inset: 4.5px; background: #fff; border-radius: 50%; }
.cat-label { font-size: .65rem; font-weight: 700; letter-spacing: 1.1px; text-transform: uppercase; color: #fff; }

/* Question text */
.q-text {
  font-size: clamp(1.1rem, 4.5vw, 1.35rem); font-weight: 600; line-height: 1.5; text-align: center;
  width: 100%; padding: 0 4px;
}

/* MC options (vertical list with letter badges) */
.options-list { display: flex; flex-direction: column; gap: 12px; width: 100%; }
.opt-card {
  display: flex; align-items: center; gap: 14px;
  padding: 16px; border-radius: var(--radius); border: 1.5px solid var(--line);
  background: var(--surface); cursor: pointer; transition: all .15s;
  text-align: left; font-size: clamp(.95rem, 3.6vw, 1.05rem); font-weight: 600; color: var(--ink);
  width: 100%;
}
.opt-card:active:not(:disabled) { transform: scale(.97); }
.opt-card:disabled { cursor: default; }
.opt-letter {
  width: 30px; height: 30px; border-radius: 9px; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  font-size: .8rem; font-weight: 700; color: var(--ink-soft);
  background: var(--surface-warm2);
}
.opt-card.correct { border-color: var(--green); background: var(--green-soft); }
.opt-card.correct .opt-letter { background: var(--green); color: #fff; }
.opt-card.wrong { border-color: var(--red); background: #FDEAEA; }
.opt-card.wrong .opt-letter { background: var(--red); color: #fff; }
.opt-card:disabled { opacity: .7; }

/* TF buttons */
.tf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; }
.tf-btn {
  padding: clamp(20px, 6vw, 28px); border-radius: 20px; border: 1.5px solid var(--line);
  background: var(--surface); font-size: clamp(1.05rem, 4vw, 1.25rem); font-weight: 700; cursor: pointer;
  text-align: center; transition: all .15s; color: var(--ink);
}
.tf-btn:active:not(:disabled) { transform: scale(.96); }
.tf-btn.correct { border-color: var(--green); background: var(--green-soft); }
.tf-btn.wrong { border-color: var(--red); background: #FDEAEA; }
.tf-btn:disabled { cursor: default; opacity: .7; }

/* Waiting overlay (after answering — shown on top of question) */
.wait-overlay {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 10px;
  padding: 14px 20px; background: rgba(42,36,30,.85); border-radius: 99px;
  z-index: 10;
}
.wait-overlay span { font-size: .9rem; font-weight: 700; color: #fff; }
.wait-spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }

/* Podium */
.podium { display: flex; flex-direction: column; gap: 12px; width: 100%; }
.podium-row {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border-radius: 16px; padding: 14px;
  border: 1px solid var(--line);
}
.podium-row.me { background: var(--accent-soft); border: 2px solid var(--accent); }
.rank-badge {
  width: 36px; height: 36px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: .8rem;
  font-weight: 900; color: #fff; flex-shrink: 0;
}
.podium-info { flex: 1; min-width: 0; }
.podium-name { font-weight: 700; font-size: .95rem; }
.podium-round-score { font-size: .72rem; color: var(--ink-soft); margin-top: 2px; font-weight: 500; }
.podium-total { font-size: 1.4rem; font-weight: 900; flex-shrink: 0; }

/* Podium blocks (final) */
.podium-blocks {
  display: flex; align-items: flex-end; justify-content: center;
  gap: 8px; width: 100%; padding: 0 16px;
}
.podium-col { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
.podium-col-name { font-size: .8rem; font-weight: 700; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.podium-col-score { font-size: .95rem; font-weight: 900; }
.podium-block {
  width: 100%; border-radius: 12px; display: flex;
  align-items: center; justify-content: center;
  font-size: 1.6rem; font-weight: 900;
}
.crown { font-size: 1.6rem; }

/* Banter card */
.banter {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border-radius: 16px; padding: 14px 16px;
  border: 1px solid var(--line); width: 100%;
}
.banter-icon { font-size: 1.5rem; }
.banter-text { font-size: .85rem; font-weight: 700; color: var(--ink); }
.banter-sub { font-size: .75rem; color: var(--ink-soft); margin-top: 2px; }

/* Download section */
.download-section {
  width: 100%; text-align: center; padding: 20px;
  background: var(--surface); border-radius: 16px;
  border: 1px solid var(--line);
}
.download-section h3 { font-size: 1rem; font-weight: 800; margin-bottom: 4px; }
.download-section p { font-size: .8rem; color: var(--ink-soft); margin-bottom: 12px; }
.download-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--ink); color: #fff; padding: 12px 24px;
  border-radius: 14px; font-size: .9rem; font-weight: 700;
  text-decoration: none; transition: opacity .2s;
}
.download-btn:active { opacity: .8; }

/* Question image (imageBased questions) */
.q-image-wrap {
  width: 100%; padding: 0 4px;
}
.q-image {
  width: 100%; max-height: 180px; object-fit: cover;
  border-radius: 16px; display: block;
}
.q-image-placeholder {
  width: 100%; height: 160px; border-radius: 16px;
  background: var(--surface-warm); display: flex;
  align-items: center; justify-content: center;
}
.q-image-placeholder .img-spinner {
  width: 24px; height: 24px; border: 3px solid var(--line);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}

/* My position callout */
.my-position { text-align: center; font-size: .85rem; color: var(--ink-soft); }
.my-position strong { color: var(--accent); font-weight: 700; }

/* Next question loader */
.next-loader { display: flex; align-items: center; gap: 8px; justify-content: center; }
.next-loader span { font-size: .82rem; color: var(--ink-soft); font-weight: 500; }
.dot-pulse { display: inline-flex; gap: 4px; }
.dot-pulse span { width: 6px; height: 6px; background: var(--ink-soft); border-radius: 50%; animation: pulse 1.2s infinite; font-size: 0; }
.dot-pulse span:nth-child(2) { animation-delay: .2s; }
.dot-pulse span:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,80%,100% { opacity: .3; } 40% { opacity: 1; } }

.status { text-align: center; font-size: .9rem; color: var(--ink-soft); min-height: 20px; }
.error { color: var(--red); font-weight: 600; }
.spinner { font-size: 2rem; text-align: center; animation: spin 2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Lobby player list */
.lobby-players { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 8px; }
.lobby-player {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 12px;
  background: var(--surface-warm); border: 1px solid var(--line);
}
.lobby-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 700; background: var(--surface-warm2); color: var(--ink-soft);
  flex-shrink: 0;
}
.lobby-avatar.host { background: var(--accent-soft); color: var(--accent-deep); }
.lobby-name { font-weight: 700; font-size: .9rem; }
.lobby-host-badge {
  font-size: .6rem; font-weight: 700; color: var(--accent);
  padding: 2px 6px; background: var(--accent-soft); border-radius: 99px;
  margin-left: auto;
}

/* Connection error banner */
.conn-error {
  padding: 10px 14px; border-radius: 12px;
  background: #FDEAEA; border: 1px solid var(--red);
  color: var(--red); font-size: .82rem; font-weight: 600;
  text-align: center; width: 100%;
}

/* Very small phones (e.g. iPhone SE / mini): tighten spacing so nothing crowds. */
@media (max-width: 360px) {
  .card { padding: 22px 16px; }
  .screen.active { gap: 12px; }
  .tf-grid { gap: 10px; }
  .options-list { gap: 10px; }
  .opt-card { padding: 14px; gap: 10px; }
}

</style>
</head>
<body>

<!-- JOIN -->
<div class="screen active" id="s-join">
  <h1>Quiz<span>li</span></h1>
  <div class="card">
    <label for="inp-name">Your Name</label>
    <input type="text" id="inp-name" placeholder="Enter your name" autocomplete="off" maxlength="20">
    <label style="margin-top:14px" for="inp-room">Room Code</label>
    <input type="text" id="inp-room" class="room-input" placeholder="XXXX" maxlength="6" autocomplete="off">
    <button class="btn-primary" id="btn-join">Join Game</button>
    <p class="status" id="join-status"></p>
  </div>
</div>

<!-- WAITING -->
<div class="screen" id="s-wait">
  <div class="card" style="text-align:center; display:flex; flex-direction:column; gap:16px; align-items:center;">
    <div class="spinner">&#9203;</div>
    <h2 style="font-weight:900;">You're in!</h2>
    <p style="color:var(--ink-soft)">Room <strong id="lbl-room"></strong></p>
    <div id="lobby-players" class="lobby-players"></div>

</div>

<!-- COUNTDOWN -->
<div class="screen" id="s-countdown">

    <p style="font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--ink-soft);">GET READY</p>
    <p id="countdown-num" style="font-size:5rem; font-weight:900; color:var(--accent);">3</p>
  </div>
</div>

<!-- QUESTION -->
<div class="screen" id="s-question">
  <div class="top-bar">
    <span class="room-pill" id="lbl-room2"></span>
    <span class="q-counter" id="lbl-qnum">Q1/8</span>
    <span class="score-badge">
      <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      <span id="lbl-score">0</span>
    </span>
  </div>
  <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
    <div class="timer-ring-wrap">
      <svg viewBox="0 0 68 68">
        <circle class="timer-ring-bg" cx="34" cy="34" r="28"/>
        <circle class="timer-ring-fg" id="timer-ring" cx="34" cy="34" r="28"
          stroke-dasharray="175.93" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-num" id="timer-num">15</div>
    </div>
    <div class="speed-bonus" id="speed-bonus">+100 speed bonus</div>
  </div>
  <div id="cat-chip-area"></div>
  <p class="q-text" id="lbl-question"></p>
  <div id="options-area"></div>
</div>

<!-- Wait overlay (shown on top of question screen after answering) -->
<div id="wait-overlay" class="wait-overlay" style="display:none;">
  <div class="wait-spinner"></div>
  <span>Waiting for others...</span>
</div>

<!-- PODIUM (between questions) -->
<div class="screen" id="s-podium">
  <p id="podium-label" style="font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--ink-soft); text-align:center;">AFTER QUESTION 1</p>
  <div class="podium" id="podium-mid"></div>
  <div id="podium-my-pos" class="my-position"></div>
  <div class="next-loader">
    <div class="dot-pulse"><span></span><span></span><span></span></div>
    <span>Next question coming up...</span>
  </div>
</div>

<!-- FINAL RESULTS -->
<div class="screen" id="s-final">
  <p style="font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--ink-soft); text-align:center;">PUB ROUND OVER</p>
  <div id="podium-blocks"></div>
  <div class="podium" id="podium-final"></div>
  <div id="final-banter"></div>
  <div class="download-section">
    <h3>Want the full experience?</h3>
    <p>Daily quizzes, streaks, achievements &amp; more</p>
    <a class="download-btn" href="https://apps.apple.com/app/quizli" target="_blank">
      &#63743; Download Quizli
    </a>
  </div>
  <button class="btn-primary" onclick="location.reload()" style="max-width:220px;">Play Again</button>
</div>

<script>
// ── Supabase REST API ──────────────────────────────────────
const API_BASE = 'https://pjhxsjpqdxrjhvabwdec.supabase.co/rest/v1';
const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqaHhzanBxZHhyamh2YWJ3ZGVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0OTQ4OTUsImV4cCI6MjA5ODA3MDg5NX0.2HU3E9hQgE-oUXbUb7VY6_0-h5LqBlktWplLGuzz5lw';
const HEADERS = { 'apikey': API_KEY, 'Authorization': 'Bearer ' + API_KEY };

let myPeerId = crypto.randomUUID();
let myName = '', roomCode = '';
let questions = [], currentQ = -1, totalScore = 0, answered = false;
let timerID = null, timeLeft = 15;
let lastMsgId = 0, pollTimer = null;
let questionsReceived = false, startReceived = false;
let podiumShownAt = 0; // timestamp when podium was shown
let pendingMessages = []; // buffer messages while podium is showing
let consecutiveFailures = 0; // for exponential backoff
const BASE_POLL_MS = 500;
const MAX_POLL_MS = 5000;

const CIRCUMFERENCE = 2 * Math.PI * 28; // timer ring circumference
const CAT_COLORS = {
  'Tube':'#E32119','Geography':'#0098D4','History':'#9B0056',
  'Landmarks':'#003688','Culture':'#00782A','Slang':'#F3A9BB',
  'Football':'#B36305','Music':'#6950A1'
};

const $ = id => document.getElementById(id);
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
  // Hide wait overlay when switching screens (except when staying on question)
  if (id !== 's-question') $('wait-overlay').style.display = 'none';
}

// Pre-fill room code from URL
const urlRoom = new URLSearchParams(location.search).get('room');
if (urlRoom) $('inp-room').value = urlRoom.toUpperCase();

// ── SEND MESSAGE ────────────────────────────────────────────
async function sendMsg(msgObj) {
  const json = JSON.stringify(msgObj);
  const bytes = new TextEncoder().encode(json);
  const b64 = btoa(String.fromCharCode(...bytes));
  try {
    await fetch(API_BASE + '/pub_messages', {
      method: 'POST',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ room: roomCode, sender: myPeerId, body: b64 })
    });
  } catch(e) { console.error('send error', e); }
}

// ── POLL FOR MESSAGES (with exponential backoff) ────────────
let polling = false;
async function pollLoop() {
  if (polling) return;
  polling = true;
  while (polling) {
    const interval = Math.min(BASE_POLL_MS * Math.pow(2, Math.min(consecutiveFailures, 3)), MAX_POLL_MS);
    await new Promise(r => setTimeout(r, interval));
    if (!polling) break;
    const ok = await poll();
    if (ok) {
      if (consecutiveFailures > 0) hideConnError();
      consecutiveFailures = 0;
    } else {
      consecutiveFailures++;
      if (consecutiveFailures >= 3) showConnError('Connection issues. Retrying...');
    }
  }
}

async function poll() {
  try {
    const url = API_BASE + '/pub_messages?room=eq.' + roomCode
      + '&id=gt.' + lastMsgId
      + '&sender=neq.' + myPeerId
      + '&order=id.asc';
    const res = await fetch(url, { headers: HEADERS });
    if (!res.ok) return false;
    const rows = await res.json();
    for (const row of rows) {
      lastMsgId = row.id;
      try {
        const raw = atob(row.body);
        const bytes = Uint8Array.from(raw, c => c.charCodeAt(0));
        const msg = JSON.parse(new TextDecoder().decode(bytes));
        processMessage(msg);
      } catch(e) { console.error('parse error', e); }
    }
    return true;
  } catch(e) {
    console.error('poll error', e);
    return false;
  }
}

function showConnError(msg) {
  const el = $('conn-error');
  if (el) { el.textContent = msg; el.style.display = ''; }
}
function hideConnError() {
  const el = $('conn-error');
  if (el) el.style.display = 'none';
}

// ── MESSAGE PROCESSING (with podium buffering) ──────────────
function processMessage(msg) {
  // If podium is showing and this is a 'next' message, buffer it
  if (podiumShownAt > 0 && 'next' in msg) {
    const elapsed = Date.now() - podiumShownAt;
    const remaining = Math.max(0, 3000 - elapsed);
    if (remaining > 0) {
      setTimeout(() => handleHost(msg), remaining);
      return;
    }
  }
  handleHost(msg);
}

// ── JOIN ─────────────────────────────────────────────────────
async function joinGame() {
  myName = $('inp-name').value.trim();
  roomCode = $('inp-room').value.trim().toUpperCase();
  if (!myName) { setStatus('join-status', 'Enter your name', true); return; }
  if (!roomCode) { setStatus('join-status', 'Enter the room code', true); return; }

  $('btn-join').disabled = true;
  setStatus('join-status', 'Joining...');

  const playerInfo = { id: myPeerId, displayName: myName, isHost: false };
  await sendMsg({ join: { player: playerInfo } });

  $('lbl-room').textContent = roomCode;
  show('s-wait');
  pollLoop();
}

$('btn-join').addEventListener('click', joinGame);

// Enter key to join from either input
$('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); $('inp-room').focus(); } });
$('inp-room').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); joinGame(); } });

function setStatus(id, msg, err) {
  const el = $(id);
  el.textContent = msg;
  el.className = 'status' + (err ? ' error' : '');
}

// ── HOST MESSAGES ────────────────────────────────────────────
function handleHost(msg) {
  if ('questions' in msg) {
    questions = msg.questions.list;
    questionsReceived = true;
    if (startReceived) runCountdown();
  } else if ('start' in msg) {
    startReceived = true;
    if (questionsReceived) runCountdown();
  } else if ('lobbyUpdate' in msg) {
    updateLobbyPlayers(msg.lobbyUpdate.players);
  } else if ('podium' in msg) {
    showMidPodium(msg.podium.rankings);
  } else if ('next' in msg) {
    podiumShownAt = 0;
    showQuestion(msg.next.questionIndex);
  } else if ('finalResults' in msg) {
    podiumShownAt = 0;
    showFinalResults(msg.finalResults.rankings);
  }
}

// ── COUNTDOWN ────────────────────────────────────────────────
function runCountdown() {
  show('s-countdown');
  let n = 3;
  $('countdown-num').textContent = n;
  const iv = setInterval(() => {
    n--;
    if (n <= 0) { clearInterval(iv); showQuestion(0); }
    else $('countdown-num').textContent = n;
  }, 1000);
}

// ── TIMER HELPERS ────────────────────────────────────────────
function timerColor(progress) {
  if (progress > 0.4) return 'var(--green)';
  if (progress > 0.15) return 'var(--accent)';
  return 'var(--red)';
}

function updateTimer() {
  const progress = timeLeft / 15;
  const color = timerColor(progress);
  const ring = $('timer-ring');
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - Math.max(0, progress));
  ring.style.stroke = color;
  $('timer-num').textContent = Math.ceil(timeLeft);
  $('timer-num').style.color = color;

  if (!answered) {
    const bonus = Math.floor((timeLeft / 15) * 100);
    $('speed-bonus').textContent = '+' + bonus + ' speed bonus';
    $('speed-bonus').style.color = color;
    $('speed-bonus').style.display = '';
  } else {
    $('speed-bonus').style.display = 'none';
  }
}

// ── QUESTION ─────────────────────────────────────────────────
function showQuestion(idx) {
  currentQ = idx;
  answered = false;
  $('wait-overlay').style.display = 'none';
  const q = questions[idx];
  if (!q) return;

  $('lbl-room2').textContent = roomCode;
  $('lbl-qnum').textContent = 'Q' + (idx + 1) + '/' + questions.length;
  $('lbl-score').textContent = totalScore;
  $('lbl-question').textContent = q.question;

  // Category chip
  const chipArea = $('cat-chip-area');
  chipArea.innerHTML = '';
  if (q.category) {
    const color = CAT_COLORS[q.category] || 'var(--accent)';
    chipArea.innerHTML = '<div class="cat-chip"><div class="cat-dot" style="background:' + color + '"></div><span class="cat-label">' + esc(q.category) + '</span></div>';
  }

  // Options
  const area = $('options-area');
  area.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  // Image for imageBased questions
  if (q.imageURL) {
    const imgWrap = document.createElement('div');
    imgWrap.className = 'q-image-wrap';
    // Show placeholder while loading
    imgWrap.innerHTML = '<div class="q-image-placeholder"><div class="img-spinner"></div></div>';
    area.appendChild(imgWrap);
    const img = new Image();
    img.className = 'q-image';
    img.alt = 'Question image';
    img.onload = () => { imgWrap.innerHTML = ''; imgWrap.appendChild(img); };
    img.onerror = () => { imgWrap.innerHTML = '<div class="q-image-placeholder" style="color:var(--ink-soft); font-size:.85rem;">Image failed to load</div>'; };
    img.src = q.imageURL;
  }

  if (q.type === 'trueFalse') {
    const grid = document.createElement('div');
    grid.className = 'tf-grid';
    ['True', 'False'].forEach((label, i) => {
      const btn = document.createElement('button');
      btn.className = 'tf-btn';
      btn.textContent = label;
      btn.addEventListener('click', () => selectTF(btn, i === 0, q));
      grid.appendChild(btn);
    });
    area.appendChild(grid);
  } else {
    const opts = q.options || q.availableLines || [];
    const list = document.createElement('div');
    list.className = 'options-list';
    opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-card';
      btn.innerHTML = '<div class="opt-letter">' + (letters[i] || '') + '</div><span>' + esc(opt) + '</span>';
      btn.addEventListener('click', () => selectOption(btn, i, q));
      list.appendChild(btn);
    });
    area.appendChild(list);
  }

  // Timer
  timeLeft = 15;
  const ring = $('timer-ring');
  ring.style.strokeDasharray = CIRCUMFERENCE;
  ring.style.strokeDashoffset = 0;
  updateTimer();
  clearInterval(timerID);
  timerID = setInterval(() => {
    timeLeft = Math.max(0, timeLeft - 0.1);
    updateTimer();
    if (timeLeft <= 0) {
      clearInterval(timerID);
      if (!answered) submitAnswer(false, 0);
    }
  }, 100);

  show('s-question');
}

function selectOption(btn, idx, q) {
  if (answered) return;
  answered = true;
  clearInterval(timerID);

  let correct = idx === q.correctIndex;

  const btns = btn.parentElement.querySelectorAll('.opt-card');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.correctIndex) b.classList.add('correct');
  });
  if (!correct) btn.classList.add('wrong');

  const score = calcScore(correct, timeLeft);
  submitAnswer(correct, score);
}

function selectTF(btn, val, q) {
  if (answered) return;
  answered = true;
  clearInterval(timerID);

  const correct = val === q.correctAnswer;
  const btns = btn.parentElement.querySelectorAll('.tf-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if ((i === 0) === q.correctAnswer) b.classList.add('correct');
  });
  if (!correct) btn.classList.add('wrong');

  const score = calcScore(correct, timeLeft);
  submitAnswer(correct, score);
}

function calcScore(correct, remaining) {
  if (!correct) return 0;
  return 100 + Math.max(0, Math.floor((remaining / 15) * 100));
}

function submitAnswer(correct, qScore) {
  totalScore += qScore;
  $('lbl-score').textContent = totalScore;
  $('speed-bonus').style.display = 'none';
  sendMsg({ answered: { questionIndex: currentQ, questionScore: qScore, totalScore: totalScore } });

  // Show waiting overlay on top of the question (like iOS)
  setTimeout(() => {
    $('wait-overlay').style.display = 'flex';
  }, 600);
}

// ── PODIUM ───────────────────────────────────────────────────
function rankBg(rank) {
  if (rank === 1) return '#E0A93E';
  if (rank === 2) return '#A6A6AB';
  if (rank === 3) return '#CC8033';
  return 'var(--ink-soft)';
}

function ordinal(n) {
  const s = n % 10;
  if (s === 1 && n % 100 !== 11) return n + 'st';
  if (s === 2 && n % 100 !== 12) return n + 'nd';
  if (s === 3 && n % 100 !== 13) return n + 'rd';
  return n + 'th';
}

function showMidPodium(rankings) {
  podiumShownAt = Date.now();
  $('wait-overlay').style.display = 'none';
  $('podium-label').textContent = 'AFTER QUESTION ' + (currentQ + 1);
  const container = $('podium-mid');
  container.innerHTML = '';

  rankings.slice(0, 3).forEach(r => {
    const isMe = r.id === myPeerId;
    const row = document.createElement('div');
    row.className = 'podium-row' + (isMe ? ' me' : '');
    row.innerHTML =
      '<div class="rank-badge" style="background:' + rankBg(r.rank) + '">' + r.rank + '</div>' +
      '<div class="podium-info">' +
        '<div class="podium-name">' + esc(r.displayName) + (isMe ? ' (you)' : '') + '</div>' +
        '<div class="podium-round-score">+' + r.lastQuestionScore + ' this round</div>' +
      '</div>' +
      '<div class="podium-total" style="color:' + rankBg(r.rank) + '">' + r.totalScore + '</div>';
    container.appendChild(row);
  });

  const posEl = $('podium-my-pos');
  const myRank = rankings.find(r => r.id === myPeerId);
  if (myRank && myRank.rank > 3) {
    posEl.innerHTML = "You're in <strong>" + ordinal(myRank.rank) + " place</strong> with " + myRank.totalScore + " points";
  } else {
    posEl.innerHTML = '';
  }

  show('s-podium');
}

function showFinalResults(rankings) {
  $('wait-overlay').style.display = 'none';
  polling = false; // stop poll loop

  // Podium blocks for top 3
  const blocks = $('podium-blocks');
  blocks.innerHTML = '';
  if (rankings.length >= 2) {
    const colors = ['#E0A93E', '#A6A6AB', '#CC8033'];
    const heights = [120, 90, 70];
    const order = [1, 0, 2]; // 2nd, 1st, 3rd
    const wrap = document.createElement('div');
    wrap.className = 'podium-blocks';
    order.forEach(idx => {
      if (idx >= rankings.length) return;
      const r = rankings[idx];
      const col = document.createElement('div');
      col.className = 'podium-col';
      col.innerHTML =
        (idx === 0 ? '<div class="crown">&#128081;</div>' : '') +
        '<div class="podium-col-name">' + esc(r.displayName) + '</div>' +
        '<div class="podium-col-score" style="color:' + colors[idx] + '">' + r.totalScore + '</div>' +
        '<div class="podium-block" style="height:' + heights[idx] + 'px; background:' + colors[idx] + '22; border:2px solid ' + colors[idx] + '; color:' + colors[idx] + '">' + r.rank + '</div>';
      wrap.appendChild(col);
    });
    blocks.appendChild(wrap);
  }

  // Full leaderboard
  const container = $('podium-final');
  container.innerHTML = '';
  rankings.forEach(r => {
    const isMe = r.id === myPeerId;
    const row = document.createElement('div');
    row.className = 'podium-row' + (isMe ? ' me' : '');
    row.innerHTML =
      '<div class="rank-badge" style="background:' + rankBg(r.rank) + '">' + r.rank + '</div>' +
      '<div class="podium-info">' +
        '<div class="podium-name">' + esc(r.displayName) + (isMe ? ' (you)' : '') + '</div>' +
      '</div>' +
      '<div class="podium-total" style="color:var(--ink)">' + r.totalScore + '</div>';
    container.appendChild(row);
  });

  // Banter for last place
  const banterEl = $('final-banter');
  banterEl.innerHTML = '';
  if (rankings.length > 1) {
    const last = rankings[rankings.length - 1];
    banterEl.innerHTML =
      '<div class="banter">' +
        '<div class="banter-icon">&#127866;</div>' +
        '<div>' +
          '<div class="banter-text">' + esc(last.displayName) + ' gets the next round in!</div>' +
          '<div class="banter-sub">Better luck next time</div>' +
        '</div>' +
      '</div>';
  }

  show('s-final');
}

// ── LOBBY PLAYERS ─────────────────────────────────────────────
function updateLobbyPlayers(players) {
  const container = $('lobby-players');
  if (!container) return;
  container.innerHTML = '';
  players.forEach(p => {
    const row = document.createElement('div');
    row.className = 'lobby-player';
    const initial = (p.displayName || '?')[0].toUpperCase();
    const isMe = p.id === myPeerId;
    row.innerHTML =
      '<div class="lobby-avatar' + (p.isHost ? ' host' : '') + '">' + esc(initial) + '</div>' +
      '<span class="lobby-name">' + esc(p.displayName) + (isMe ? ' (you)' : '') + '</span>' +
      (p.isHost ? '<span class="lobby-host-badge">HOST</span>' : '');
    container.appendChild(row);
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
